<h2>Todos</h2>

<input
  type="text"
  [(ngModel)]="newTodoTitle"
  placeholder="New todo"
/>

<button (click)="addTodo()">
  Add
</button>

<p>
  Completed:
  {{ dataService.completedTodosCount() }}
</p>

<ul>
  <li *ngFor="let todo of dataService.todos()">
    <input
      type="checkbox"
      [checked]="todo.completed"
      (change)="dataService.toggleTodo(todo.id)"
    />

    {{ todo.title }}

    <button (click)="dataService.removeTodo(todo.id)">
      Delete
    </button>
  </li>
</ul>
